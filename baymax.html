<style>
*{ margin:0; padding:0; box-sizing:border-box;}
html,body{min-height:100%;}
body{
	background:
		radial-gradient(circle at 50% 28%, rgba(255,255,255,0.32) 0 8%, transparent 24%),
		radial-gradient(circle at 78% 16%, rgba(255,86,84,0.35) 0 4%, transparent 18%),
		linear-gradient(155deg,#18283b 0%,#24334f 38%,#c65f55 72%,#ffd39a 100%);
	overflow:hidden;
	font-family:"Trebuchet MS","Microsoft YaHei",sans-serif;
	color:#fff7e9;
}
body:before{
	content:"";
	position:fixed;
	inset:0;
	z-index:0;
	pointer-events:none;
	background:
		linear-gradient(90deg,rgba(10,14,26,0.72) 0 8px,transparent 8px 24px,rgba(255,255,255,0.28) 24px 34px,transparent 34px 58px,rgba(10,14,26,0.72) 58px 66px),
		linear-gradient(270deg,rgba(10,14,26,0.72) 0 8px,transparent 8px 24px,rgba(255,255,255,0.28) 24px 34px,transparent 34px 58px,rgba(10,14,26,0.72) 58px 66px);
	background-size:74px 100%,74px 100%;
	background-position:left top,right top;
	background-repeat:repeat-y;
	opacity:.46;
}
body:after{
	content:"";
	position:fixed;
	inset:-20%;
	z-index:0;
	pointer-events:none;
	background:
		repeating-radial-gradient(circle at 18% 28%,rgba(255,255,255,0.22) 0 1px,transparent 1px 4px),
		radial-gradient(ellipse at center,transparent 0 48%,rgba(7,10,18,0.52) 74%,rgba(7,10,18,0.88) 100%);
	mix-blend-mode:soft-light;
	animation:filmgrain 9s steps(5,end) infinite;
}
.movieScene{
	position:relative;
	z-index:1;
	min-height:100vh;
	padding:28px 20px 58px;
	overflow:hidden;
}
.movieScene:before{
	content:"";
	position:absolute;
	z-index:0;
	left:50%;
	top:4%;
	width:560px;
	height:560px;
	transform:translateX(-50%);
	border-radius:50%;
	background:radial-gradient(circle,rgba(255,255,255,0.72) 0 16%,rgba(255,226,171,0.32) 24%,rgba(255,91,91,0.12) 42%,transparent 68%);
	filter:blur(2px);
	opacity:.78;
}
.movieScene:after{
	content:"";
	position:absolute;
	z-index:0;
	left:-5%;
	right:-5%;
	bottom:-7px;
	height:150px;
	background:
		linear-gradient(90deg,transparent 0 4%,#172234 4% 9%,transparent 9% 12%,#172234 12% 19%,transparent 19% 23%,#172234 23% 31%,transparent 31% 36%,#172234 36% 45%,transparent 45% 51%,#172234 51% 57%,transparent 57% 62%,#172234 62% 72%,transparent 72% 76%,#172234 76% 84%,transparent 84% 90%,#172234 90% 96%,transparent 96%),
		linear-gradient(180deg,transparent 0,#111827 70%);

	opacity:.86;
}

}

{

<body>
<main class="movieScene">
<header class="posterTitle">
	<h1>Bay<span class="mark"></span>max</h1>

</header>

	</div>

	<div class="headWrap">
		<div class="head">
			<div class="cover-s"><div class="left"></div><div class="right"></div></div>

		</div>
	</div>
    <div class="body-wrap">
		<div class="hand-wrap">
			<div class="hand-l">
				<div class="hl-l"></div>
				<div class="f-1"></div>
				<div class="f-2"></div>
				<div class="f-3"></div>
			</div>
			<div class="hand-r">
				<div class="hr-r"></div>
				<div class="fr-1"></div>
				<div class="fr-2"></div>
				<div class="fr-3"></div>
			</div>
		</div>
		<div class="body">
			<div class="heart">_/￣\_</div>
			<div class="belly"></div>
		</div>
	</div>
	<div class="leg-wrap">
	 <div class="leg-l"></div>
	 <div class="leg-r"></div>
	</div>
</div>
</section>
<p class="addTalkWrap">
	<a id="addTalk" href="javascript:;">定制你的专属大白</a>
</p>
<dialog id="talkDialog" class="talkDialog">
	<div class="talkDialogHead">
		台词定制
		<button type="button" class="talkDialogClose" onclick="closeTalkDialog()">×</button>
	</div>
	<div class="talkDialogBody">
		<div id="createurlBox">
			<textarea id="addTextarea">Hello!</textarea><button onclick="createURL()">生成</button>
		</div>
		<div id="urlInput">&nbsp;&nbsp;</div>
	</div>
</dialog>
</main>
</body>
<script>
document.querySelector('body').addEventListener('touchmove', function(e) {
	e.preventDefault();
})
document.body.addEventListener('touchstart', function (){}); 
events.addEvent($id("addTalk"),"click",function(){
	var talkDialog = $id("talkDialog");
	resetTalkDialog();
	if (talkDialog.showModal) {
		talkDialog.showModal();
	} else {
		talkDialog.setAttribute("open", "open");
	}
});
function resetTalkDialog(){
	$id("addTextarea").value = "Hello!";
	$id("urlInput").innerHTML = "&nbsp;&nbsp;";
	$id("createurlBox").style.display = "block";
}
function closeTalkDialog(){
	var talkDialog = $id("talkDialog");
	if (talkDialog.close) {
		talkDialog.close();
	} else {
		talkDialog.removeAttribute("open");
	}
}
function getParms(){
	//获取地址栏参数
	var url=document.location,
		arr = url.search.substring(1).split("&"),
		arrHash = {};
	for(var i=0;i<arr.length;i++){
		arrHash[arr[i].split("=")[0]]=unescape(arr[i].split("=")[1]);
	}
	return arrHash;
}
var urlArr = getParms();
if(urlArr.say){
	$id("talkBox").innerHTML = unescape(urlArr.say);

function createURL(){
	var url = "/show/baymax.html?say=" + escape($id("addTextarea").value);
	var xhr = new XMLHttpRequest();
		xhr.open('GET', '/me.php?r=/codyy/createShortURL&url='+url); 
		xhr.onload = function(e) { //绑定onload
		  var data = JSON.parse(this.response); //json解析
		  $id("urlInput").innerHTML = data.tinyurl;
		  $id("createurlBox").style.display = "none";
		};
		xhr.send();
}
