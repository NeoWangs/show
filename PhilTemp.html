<!doctype html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>网易“哲学气质”答案解析</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <script src="public/js/react/react.development.js"></script>
    <script src="public/js/react/react-dom.development.js"></script>
    <script src="public/js/react/babel.min.js"></script>
    <style>
        :root {
            --paper: #f6f4ef;
            --ink: #1f2528;
            --muted: #687076;
            --line: #d8d3c7;
            --panel: #ffffff;
            --red: #bf2f24;
            --teal: #0f766e;
            --blue: #325f9f;
            --shadow: 0 18px 45px rgba(31, 37, 40, .12);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background:
                linear-gradient(135deg, rgba(50, 95, 159, .10), transparent 28%),
                linear-gradient(315deg, rgba(191, 47, 36, .08), transparent 32%),
                var(--paper);
        }

        body {
            min-height: 100%;
            margin: 0;
            color: var(--ink);
            font-size: 15px;
            font-family: "Noto Serif SC", "Songti SC", "STSong", "Source Han Serif SC", serif;
            line-height: 1.7;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .content {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 40px 0 56px;
        }

        .pageHeader {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 24px;
            padding: 0 0 26px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 8px;
            color: var(--teal);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 28px;
            height: 2px;
            background: var(--teal);
        }

        h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.18;
            font-weight: 800;
            letter-spacing: 0;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(2, minmax(92px, 1fr));
            gap: 10px;
            min-width: 230px;
        }

        .summaryItem {
            min-height: 76px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, .72);
            border: 1px solid var(--line);
            box-shadow: 0 8px 20px rgba(31, 37, 40, .06);
        }

        .summaryLabel {
            display: block;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.2;
        }

        .summaryValue {
            display: block;
            margin-top: 6px;
            color: var(--ink);
            font-size: 22px;
            font-weight: 800;
            line-height: 1.1;
            word-break: break-word;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 28px;
            align-items: start;
            padding-top: 28px;
        }

        .qustionBox,
        .answerList {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .qustionBox {
            display: grid;
            gap: 14px;
        }

        .questionItem {
            position: relative;
            overflow: hidden;
            padding: 20px 22px 18px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-left: 5px solid transparent;
            box-shadow: 0 10px 26px rgba(31, 37, 40, .07);
            transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
        }

        .questionItem::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(90deg, rgba(15, 118, 110, .08), transparent 42%);
            opacity: 0;
            transition: opacity .18s ease;
        }

        .questionItem:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .questionItem.isSelected {
            border-left-color: var(--teal);
        }

        .questionItem.isSelected::after {
            opacity: 1;
        }

        h4 {
            position: relative;
            z-index: 1;
            margin: 0;
            padding: 0;
            font-size: 18px;
            line-height: 1.45;
            font-weight: 800;
        }

        .optionGroup {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .optionLabel {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            max-width: 100%;
            padding: 7px 12px;
            background: #f8faf9;
            border: 1px solid #dfe5df;
            color: #2f383c;
            font-size: 14px;
            line-height: 1.45;
            transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
        }

        .optionLabel:hover {
            transform: translateY(-1px);
            border-color: rgba(15, 118, 110, .45);
            background: #eef8f4;
        }

        .optionLabel input,
        .rankItem input {
            flex: 0 0 auto;
            width: 16px;
            height: 16px;
            margin: 0 8px 0 0;
            accent-color: var(--teal);
        }

        .optionLabel.optionSelected {
            border-color: var(--teal);
            background: #e5f3ef;
            color: #103f3b;
            font-weight: 700;
        }

        .answerBox {
            position: sticky;
            top: 18px;
            padding: 18px;
            background: rgba(31, 37, 40, .94);
            color: #f8f7f2;
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: var(--shadow);
        }

        .panelTitle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .panelTitle h2 {
            margin: 0;
            font-size: 18px;
            line-height: 1.3;
            letter-spacing: 0;
        }

        .topScore {
            flex: 0 1 auto;
            min-width: 0;
            max-width: 64%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 2px 8px;
            color: #f5c15e;
            background: rgba(245, 193, 94, .12);
            border: 1px solid rgba(245, 193, 94, .35);
            font-size: 12px;
            font-weight: 800;
        }

        .answerList {
            display: grid;
            gap: 6px;
            max-height: calc(100vh - 174px);
            overflow: auto;
            padding-right: 2px;
        }

        .normal,
        .rankItem {
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr) auto;
            align-items: center;
            min-height: 34px;
            width: 100%;
            padding: 6px 8px;
            color: rgba(248, 247, 242, .88);
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .07);
            font-size: 13px;
            line-height: 1.35;
            transition: background .18s ease, border-color .18s ease, transform .18s ease;
        }

        .rankItem:hover {
            transform: translateX(2px);
            border-color: rgba(255, 255, 255, .22);
            background: rgba(255, 255, 255, .11);
        }

        .rankName {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score {
            min-width: 28px;
            color: #f5c15e;
            font-weight: 800;
            text-align: right;
        }

        .red,
        .rankItem.red {
            color: #fff;
            background: rgba(191, 47, 36, .42);
            border-color: rgba(255, 145, 132, .65);
        }

        .rankItem.red .score {
            color: #fff1c2;
        }

        .resetButton {
            width: 100%;
            min-height: 40px;
            margin-top: 14px;
            color: #fff;
            background: var(--red);
            border: 0;
            font-weight: 800;
            box-shadow: 0 10px 22px rgba(191, 47, 36, .25);
            transition: transform .18s ease, filter .18s ease;
        }

        .resetButton:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        @media (max-width: 860px) {
            .content {
                width: min(100% - 22px, 680px);
                padding-top: 24px;
            }

            .pageHeader,
            .layout {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 28px;
            }

            .summary {
                min-width: 0;
            }

            .answerBox {
                position: relative;
                top: auto;
                order: -1;
            }

            .answerList {
                max-height: 320px;
            }
        }

        @media (max-width: 520px) {
            .content {
                width: calc(100% - 16px);
                padding-bottom: 32px;
            }

            .questionItem {
                padding: 16px 14px;
            }

            .optionGroup {
                display: grid;
                grid-template-columns: 1fr;
            }

            .optionLabel {
                width: 100%;
            }

            .topScore {
                display: none;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  class ShowBox extends React.Component {
    constructor(props) {
      super(props);
      this.state = {
        names: ["唯美主义-纯粹", "存在主义-本真", "荒诞主义-反叛", "利他主义-无私", "伊壁鸠鲁主义-享乐", "实用主义-务实", "怀疑主义-善思", "感觉主义-随性", "集体主义-克己", "平等主义-公正", "和平主义-温和", "理性主义-理性", "个人主义-个性", "斯多葛主义-沉着", "情感主义-感性", "绝对主义-坚定", "相对主义-通达", "犬儒主义-淡泊", "狂热主义-激情", "悲观主义-通透", "柏拉图主义-理想", "达尔文主义-进取", "马克思主义-思辨"],
        questions: [[[20, 16, 15, 8, 1], [6, 12, 22, 13, 2, 23]], [[16, 12, 5, 6], [17, 7, 15, 22, 23]], [[19, 13, 1, 22], [10, 11, 5, 4], [7, 13, 5, 18], [10, 4, 21, 11, 23]], [[3, 12, 23, 7], [1, 21, 15, 2], [8, 13, 7, 16, 6, 18]], [[8, 16, 9], [6, 17, 23, 7, 10]], [[20, 12, 14, 11], [2, 17, 23, 22], [3, 1, 13, 21, 2]], [[5, 3, 18, 10, 4, 19, 11, 21], [12, 6, 14, 20, 17, 9]], [[11, 14, 8, 23, 10, 9], [2, 20, 15, 18], [19, 5, 3, 22, 1]], [[19, 21, 2, 13, 3, 18, 16], [22, 23, 10, 4, 5, 11, 18, 14], [2, 17, 12, 13, 10, 11], [21, 5, 4, 1, 11, 15]], [[20, 15, 13, 21, 19, 3], [18, 12, 6, 14, 4, 9]]],
        subjects: [
          {title: '1.你所经历的一切是：', answer: ["A:命中注定的", "B:由你过去的选择决定的"], },
          {title: '2.七年前的你和现在的你是同一个人吗？', answer: ['A:是', 'B:不是'], selected: -1},
          {title: '3.金鱼被放入搅拌机，你会？', answer: ['A:按下开关', 'B:不安并走开', 'C:围观', 'D:阻止'], selected: -1},
          {title: '4.博物馆的纯红色画，你认为是？', answer: ['A:看不懂的艺术品', 'B:阿拉伯的红海', 'C:不是艺术品'], selected: -1},
          {title: '5.乌鸦都是黑色的吗？', answer: ['A:是', 'B:不是'], selected: -1},
          {title: '6.哪件物品最能代表你的人生？', answer: ['A:摇摆的钟摆', 'B:滚动的骰子', 'C:空白的纸'], selected: -1},
          {title: '7.你宁愿做一个？', answer: ['A:快乐的狗', 'B:不快乐的人'], selected: -1},
          {title: '8.你认为死亡是一场？', answer: ['A:昏睡', 'B:宿醉', 'C:狂欢'], selected: -1},
          {
            title: '9.选一句最喜欢的？',
            answer: ['A:我是百依百顺的孩子单只顺从我自己', 'B:凡活着的就该活下去', 'C:你凝视深渊深渊必将凝视你', 'D:我们都生活在阴沟，但仍有人仰望星空'],
            selected: -1
          },
          {title: '10.你会选择？', answer: ['A:得到一次人生重来的机会', 'B:继续现在的人生'], selected: -1},
        ],
        aList: [],
        copyList : [],
      };
    }

    keySort(key,desc){
      return function(a, b) {
        return desc ? b[key] - a[key] : a[key] - b[key];
      }
    }

    chooseElement(target) {
      var t = target.name, v = target.value, r = this.state.questions[t][v];
      var oldValue = target.dataset.tempvalue, oldR = oldValue !== undefined ?  this.state.questions[t][oldValue] : [];
      var aList = [].concat(this.state.aList);
      aList.map((item) => {
        item.focus = false; //取消红色聚焦
      });

      for (var i = 0; i < oldR.length; i++) {
        aList[oldR[i] - 1].count --; //选项更换，取消加分
      }

      for (var i = 0; i < r.length; i++) {
        aList[r[i] - 1].count ++;
        aList[r[i] - 1].focus = true;
      }

      var subjects = [...this.state.subjects];
      subjects[t].tempValue = v;

      var copyList = [...this.state.aList];
      copyList = copyList.sort(this.keySort("count",true));
      this.setState({
        aList: aList,
        copyList:copyList,
        subjects: subjects
      });
    };

    chooseAnswer(target){
      var subjects = [...this.state.subjects];
      this.state.questions.map((list,i)=>{
        subjects[i].tempValue = -1;
        list.map((options,j)=>{
          options.map((choice)=>{

            if(choice -1 == target.value) {
              subjects[i].tempValue =  j
            }
          })
        })
      });
      this.setState({
        subjects: subjects
      });
    }

    componentDidMount() {
      var list = [];
      for (var i = 0; i < this.state.names.length; i++) {
        list.push({
          index: i,
          name: this.state.names[i],
          count: 0,
          focus: false
        });
      }
      this.setState({
        aList: [...this.state.aList, ...list],
        copyList: [...this.state.copyList, ...list],
      });
    }

    render() {
      var answeredCount = this.state.subjects.filter((item) => item.tempValue !== undefined && item.tempValue !== -1).length;
      var topItem = this.state.copyList[0] || {name: '等待作答', count: 0};
      return (
        <div className="content">
          <header className="pageHeader">
            <div>
              <p className="eyebrow">Philosophy Index</p>
              <h1>网易“哲学气质”答案解析</h1>
            </div>
            <div className="summary">
              <div className="summaryItem">
                <span className="summaryLabel">已答题</span>
                <span className="summaryValue">{answeredCount}/10</span>
              </div>
              <div className="summaryItem">
                <span className="summaryLabel">当前最高</span>
                <span className="summaryValue">{topItem.count}</span>
              </div>
            </div>
          </header>
          <main className="layout">
            <ul className="qustionBox">
              {
                this.state.subjects.map((item, index) => {
                  var selected = item.tempValue !== undefined && item.tempValue !== -1;
                  return (<li className={selected ? 'questionItem isSelected' : 'questionItem'} key={index}>
                      <h4>{item.title}</h4>
                      <div className="optionGroup">
                        {
                          item['answer'].map((a, i) => {
                            return <label className={item.tempValue == i ? 'optionLabel optionSelected' : 'optionLabel'} key={i}><input name={index} data-tempvalue={item.tempValue} value={i} checked={item.tempValue == i} type='radio'
                                                       onChange={(e) => this.chooseElement(e.target)}/>{a}</label>
                          })
                        }
                      </div>
                    </li>
                  )
                })}
            </ul>
            <aside className="answerBox">
              <div className="panelTitle">
                <h2>气质排行</h2>
                <span className="topScore">{topItem.name}</span>
              </div>
              <div className="answerList">
                {
                  this.state.copyList.map((item) => {
                    return <label className={item.focus ? 'normal rankItem red' : 'normal rankItem'}
                               key={item.index}><input name="answer" value={item.index} onChange={(e) => this.chooseAnswer(e.target)} type="radio" /><span className="rankName">{item.name}</span><span className="score">{item.count}</span></label>
                  })}
              </div>
                <button className="resetButton" onClick={()=>location.reload()}>刷新</button>
            </aside>
          </main>
        </div>
      );
    }
  }
  ReactDOM.render(<ShowBox/>, document.getElementById('root'));
</script>
</body>
</html>
